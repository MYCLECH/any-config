spring:
  application:
    name: products-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/productsdb
      auto-index-creation: true
  webflux:
    log-request-details: false

logging:
  level:
    root: INFO
    org.nttdata.bank.products: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/products-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8082

