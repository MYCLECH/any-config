spring:
  application:
    name: products-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/productsdb
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
  webflux:
    log-request-details: false

logging:
  level:
    root: INFO
    org.nttdata.bank.products: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/products-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
clients:
  service:
    base-url: http://localhost:8079

transactions:
  service:
    base-url: http://localhost:8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

resilience4j:
  timelimiter:
    instances:
      clientsService:
        timeout-duration: 2s
  circuitbreaker:
    instances:
      clientsService:
        sliding-window-size: 10
        failure-rate-threshold: 50
security:
  jwt:
    secret-base64: c3VwZXItc2VjcmV0LWtleS13aXRoLWxlbmd0aC1mb3Itand0LTMxLXNpemU=
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8082

